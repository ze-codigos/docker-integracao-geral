services:
  # ──────────────────────────────────────────────────────────────────────
  # Only services with external providers get homolog env overrides.
  # Container names stay as .dev so all other services can resolve them.
  # All other services run with their defaults from docker-compose.yml.
  # ──────────────────────────────────────────────────────────────────────

  nexus:
    env_file:
      - .env
      - .env.dev
      - .env.homolog

  rodobus:
    env_file:
      - .env
      - .env.dev
      - .env.homolog

  search_flights_go:
    env_file:
      - .env
      - .env.dev
      - .env.homolog

  heroseguros:
    env_file:
      - .env
      - .env.dev
      - .env.homolog
